{{define "content"}}
<div class="form-container">
    <h2>Welcome Back</h2>
    <p class="text-muted" style="margin-bottom: 2rem;">Login to your account</p>
    <form action="/login" method="POST">
        <div class="form-group">
            <label for="role">I am a:</label>
            <select name="role" id="role" class="form-control" required>
                <option value="customer">Customer / Attendee</option>
                <option value="doer">Doer / Organizer</option>
            </select>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@example.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Sign In</button>
    </form>
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
        Don't have an account? <a href="/register" style="color: var(--primary-color);">Register here</a>
    </p>
</div>
{{end}}
