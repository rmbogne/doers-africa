{{define "content"}}
<section
    style="
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem;
        background: var(--bg-card);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 1rem;
    "
>
    {{if .Event.ImageURL}}
        <img
            src="{{.Event.ImageURL}}"
            alt="{{.Event.Title}}"
            style="
                width: 100%;
                max-height: 480px;
                margin-bottom: 2rem;
                border-radius: 0.85rem;
                object-fit: cover;
            "
        >
    {{end}}

    <div
        style="
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1.5rem;
            flex-wrap: wrap;
        "
    >
        <div>
            <div
                style="
                    display: inline-block;
                    padding: 0.45rem 0.75rem;
                    margin-bottom: 0.75rem;
                    border-radius: 0.5rem;
                    background: rgba(255,255,255,0.08);
                    font-weight: 700;
                "
            >
                {{.Event.Date}}
            </div>

            <h1 style="margin: 0 0 0.75rem;">
                {{.Event.Title}}
            </h1>

            <p style="color: var(--accent);">
                {{.Event.Location}}
            </p>

            <p style="color: var(--text-muted);">
                Organized by {{.DoerName}}
            </p>
        </div>

        {{if eq .Role "customer"}}
            {{if .HasRSVPd}}
                <span class="btn btn-secondary">
                    RSVP Confirmed
                </span>
            {{else}}
                <form
                    action="/event/{{.Event.ID.Hex}}/rsvp"
                    method="POST"
                >
                    <input
                        type="hidden"
                        name="csrf_token"
                        value="{{.CSRFToken}}"
                    >

                    <button type="submit" class="btn btn-primary">
                        RSVP
                    </button>
                </form>
            {{end}}
        {{end}}
    </div>

    <div
        style="
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            line-height: 1.8;
        "
    >
        {{.Event.Description}}
    </div>
</section>
{{end}}
