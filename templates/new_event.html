{{define "content"}}
<div class="form-container">
    <h2>Add New Event</h2>
    <p class="text-muted" style="margin-bottom: 2rem;">Create a new public event to attract prospects.</p>
    <form action="/doer/event/new" method="POST">
        <div class="form-group">
            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" class="form-control" required placeholder="e.g. Lagos Tech Meetup">
        </div>
        <div class="form-group">
            <label for="description">Event Description</label>
            <textarea id="description" name="description" class="form-control" rows="4" required placeholder="Describe the event..."></textarea>
        </div>
        <div class="form-group">
            <label for="date">Event Date</label>
            <input type="date" id="date" name="date" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" class="form-control" required placeholder="e.g. Lagos">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Event</button>
    </form>
</div>
{{end}}
