{{define "content"}}
<div class="form-container">
    <h2>Add New Service</h2>
    <p class="text-muted" style="margin-bottom: 2rem;">Offer a new service to prospective customers.</p>
    <form action="/doer/service/new" method="POST">
        <div class="form-group">
            <label for="title">Service Title</label>
            <input type="text" id="title" name="title" class="form-control" required placeholder="e.g. Corporate Catering">
        </div>
        <div class="form-group">
            <label for="description">Service Description</label>
            <textarea id="description" name="description" class="form-control" rows="4" required placeholder="Describe what the service provides..."></textarea>
        </div>
        <div class="form-group">
            <label for="price">Price ($)</label>
            <input type="number" id="price" name="price" class="form-control" required placeholder="100" min="0">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Create Service</button>
    </form>
</div>
{{end}}
