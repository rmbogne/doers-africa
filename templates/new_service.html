{{define "content"}}

<div
    id="upload-feedback"
    role="alert"
    tabindex="-1"
    {{if not .UploadError}}hidden{{end}}
    style="
        position: fixed;
        top: 1.5rem;
        right: 1.5rem;
        z-index: 1100;
        width: min(430px, calc(100vw - 3rem));
        padding: 1rem 1.25rem;
        background: #991b1b;
        color: white;
        border-radius: 0.75rem;
        box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    "
>
    <div
        style="
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        "
    >
        <div>
            <strong>Image upload failed.</strong>

            <p
                data-upload-message
                style="margin: 0.35rem 0 0;"
            >
                {{.UploadError}}
            </p>
        </div>

        <button
            type="button"
            data-upload-dismiss
            aria-label="Close upload message"
            style="
                border: 0;
                background: transparent;
                color: white;
                font-size: 1.25rem;
                cursor: pointer;
            "
        >
            &times;
        </button>
    </div>
</div>

<section
    style="
        max-width: 760px;
        margin: 0 auto;
        padding: 2rem;
        background: var(--bg-card);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 1rem;
    "
>
    <h1 style="margin-top: 0;">Create Service</h1>

    <form
        action="/doer/service/new"
        method="POST"
        enctype="multipart/form-data"
        data-image-upload-form
        data-upload-popup="upload-feedback"
        data-max-upload-bytes="2097152"
        style="display: grid; gap: 1rem;"
    >
        <input
            type="hidden"
            name="csrf_token"
            value="{{.CSRFToken}}"
        >

        <label>
            Title
            <input
                type="text"
                name="title"
                maxlength="150"
                required
            >
        </label>

        <label>
            Description
            <textarea
                name="description"
                maxlength="3000"
                rows="6"
                required
            ></textarea>
        </label>

        <label>
            Price
            <input
                type="number"
                name="price"
                min="0"
                step="1"
                required
            >
        </label>

        <label>
            Service image
            <input
                type="file"
                name="image"
                accept="image/jpeg,image/png,.jpg,.jpeg,.png"
            >
        </label>

        <small style="color: var(--text-muted);">
            Optional. JPEG or PNG, maximum 2 MB. The server removes metadata,
            corrects orientation, resizes, and stores a new JPEG.
        </small>

        <button type="submit" class="btn btn-primary">
            Create Service
        </button>
    </form>
</section>

<script src="/static/js/image_upload.js"></script>
{{end}}
