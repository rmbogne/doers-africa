{{define "content"}}
<div class="form-container">
    <h2>Create an Account</h2>
    <p class="text-muted" style="margin-bottom: 2rem;">Join the African Doers network</p>
    <form action="/register" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="role">I want to:</label>
            <select name="role" id="role" class="form-control" required onchange="toggleDoerFields()">
                <option value="customer">Attend Events / Hire Services (Customer)</option>
                <option value="doer">Host Events / Offer Services (Doer)</option>
            </select>
        </div>
        <div class="form-group">
            <label id="name-label" for="name">Full Name</label>
            <input type="text" id="name" name="name" class="form-control" required placeholder="Your Name">
        </div>
        <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="you@domain.com">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Create a strong password">
        </div>

        <div id="doer-fields" style="display: none; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 1rem;">
            <h3 style="margin-bottom: 1rem;">Doer Details</h3>
            <div class="form-group">
                <label for="category">Category of Service</label>
                <select name="category" id="category" class="form-control">
                    <option value="Food">Food</option>
                    <option value="Entertainment">Entertainment</option>
                    <option value="Sport and Leisure">Sport and Leisure</option>
                    <option value="Beauty">Beauty</option>
                </select>
            </div>
            <div class="form-group">
                <label for="description">Description of Offer</label>
                <textarea id="description" name="description" class="form-control" rows="3" placeholder="Describe your services..."></textarea>
            </div>
            <div class="form-group">
                <label for="zipcode">Zip Code (e.g. 10001)</label>
                <input type="text" id="zipcode" name="zipcode" class="form-control" placeholder="10001">
            </div>
            <div class="form-group">
                <label for="radius">Radius of Availability (miles)</label>
                <input type="number" id="radius" name="radius" class="form-control" placeholder="50">
            </div>
            <div class="form-group">
                <label>Social Networks (Optional)</label>
                <input type="text" name="facebook" class="form-control" placeholder="Facebook URL" style="margin-bottom: 0.5rem;">
                <input type="text" name="tiktok" class="form-control" placeholder="TikTok Handle" style="margin-bottom: 0.5rem;">
                <input type="text" name="instagram" class="form-control" placeholder="Instagram Handle">
            </div>
            <div class="form-group">
                <label for="flyer">Flyer (Image Upload)</label>
                <input type="file" id="flyer" name="flyer" class="form-control" accept="image/*" style="padding: 0.5rem;">
            </div>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Create Account</button>
    </form>
    
    <script>
    function toggleDoerFields() {
        var role = document.getElementById('role').value;
        var nameLabel = document.getElementById('name-label');
        var fields = document.getElementById('doer-fields');
        if (role === 'doer') {
            fields.style.display = 'block';
            nameLabel.innerText = 'Service Name / Provider Name';
        } else {
            fields.style.display = 'none';
            nameLabel.innerText = 'Full Name';
        }
    }
    document.addEventListener("DOMContentLoaded", toggleDoerFields);
    </script>
    <p style="margin-top: 1.5rem; text-align: center; color: var(--text-muted);">
        Already have an account? <a href="/login" style="color: var(--primary-color);">Login here</a>
    </p>
</div>
{{end}}
