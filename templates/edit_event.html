{{define "content"}}
<div class="form-container">
    <h2>Edit Event</h2>
    <form action="/doer/event/edit/{{.Event.ID.Hex}}" method="POST">
        <div class="form-group">
            <label for="title">Event Title</label>
            <input type="text" id="title" name="title" class="form-control" required value="{{.Event.Title}}">
        </div>
        <div class="form-group">
            <label for="description">Event Description</label>
            <textarea id="description" name="description" class="form-control" rows="4" required>{{.Event.Description}}</textarea>
        </div>
        <div class="form-group">
            <label for="date">Event Date</label>
            <input type="date" id="date" name="date" class="form-control" required value="{{.Event.Date}}">
        </div>
        <div class="form-group">
            <label for="location">Location</label>
            <input type="text" id="location" name="location" class="form-control" required value="{{.Event.Location}}">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Update Event</button>
    </form>
    <a href="/doer/dashboard" style="display:block; text-align:center; margin-top:1rem; color:var(--text-muted);">Cancel</a>
</div>
{{end}}
